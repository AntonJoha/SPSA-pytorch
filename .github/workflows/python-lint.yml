name: Python Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ruff
        run: python -m pip install --upgrade pip "ruff==0.15.11"

      - name: Run Ruff check
        run: ruff check .
